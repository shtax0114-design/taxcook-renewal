<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>신청 상세 | 택스쿡</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="styles-renewal-20260501-payment-info.css">
    <link rel="stylesheet" href="styles-renewal-20260501-admin-detail-legacy-v4.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="site-renewal-20260501-supabase-config.js"></script>
    <script defer src="site-renewal-20260501-supabase-core-v7.js"></script>
    <script defer src="site-renewal-20260501-admin-detail-v4.js"></script>
  </head>
  <body class="ops-admin-page legacy-detail-page">
    <main class="ops-main legacy-detail-main">
      <section class="legacy-section">
        <div class="legacy-section-title">
          <span>신청자 정보</span>
          <a class="legacy-button subtle" data-list-link href="admin.html">목록</a>
        </div>
        <div class="legacy-applicant-strip">
          <div class="legacy-info-cell"><strong>신청일자</strong><span data-detail-text="appliedAt">-</span></div>
          <div class="legacy-info-cell"><strong>상호</strong><span data-detail-text="company">-</span></div>
          <div class="legacy-info-cell"><strong>사업자번호</strong><span data-detail-text="businessNumber">-</span></div>
          <div class="legacy-info-cell"><strong>휴대폰번호</strong><span data-detail-text="phone">-</span></div>
        </div>
      </section>

      <form class="legacy-section" data-application-detail>
        <input type="hidden" name="id">
        <div class="legacy-section-title action-title">
          <span>신고처리 정보</span>
          <button class="legacy-button" type="button" data-edit-application>수정</button>
          <button class="legacy-button" type="submit">저장</button>
          <button class="legacy-button danger" type="button" data-delete-application>삭제</button>
          <span class="legacy-save-message" data-save-message hidden></span>
        </div>

        <div class="legacy-process-panel">
          <div class="legacy-col readonly-col">
            <div class="legacy-read-item">
              <strong>귀속</strong>
              <span data-detail-text="period">-</span>
            </div>
            <div class="legacy-read-item">
              <strong>기본수수료</strong>
              <span data-detail-money="baseFee">-</span>
            </div>
            <div class="legacy-read-item">
              <strong>최종수수료</strong>
              <span data-detail-money="finalPaymentAmount">-</span>
            </div>
            <div class="legacy-read-item memo-label">
              <strong>비고_특이사항</strong>
            </div>
          </div>

          <div class="legacy-col readonly-col">
            <div class="legacy-read-item">
              <strong>유형</strong>
              <span data-detail-text="type">-</span>
            </div>
            <div class="legacy-read-item">
              <strong>할인금액</strong>
              <span data-detail-money="discountAmount">-</span>
            </div>
            <div class="legacy-read-item">
              <strong>결제상태</strong>
              <span class="legacy-status-pill" data-detail-text="paymentStatus">-</span>
            </div>
          </div>

          <div class="legacy-col">
            <div class="legacy-read-item">
              <strong>할인코드</strong>
              <span data-detail-text="couponCode">-</span>
            </div>
            <div class="legacy-read-item">
              <strong>합계금액 (공급대가)</strong>
              <span data-detail-money="supplyAmount">-</span>
            </div>
            <label class="legacy-field">
              <span>신고일자</span>
              <input type="date" name="reportDate">
            </label>
          </div>

          <div class="legacy-col">
            <label class="legacy-field">
              <span>발행세액공제</span>
              <input type="number" name="creditDeduction" min="0" placeholder="금액">
            </label>
            <label class="legacy-field">
              <span class="sr-only">추가결제 항목</span>
              <select name="extraPaymentType">
                <option value="">추가결제선택</option>
                <option>미등록카드추가</option>
                <option>온라인매출</option>
                <option>기타</option>
              </select>
            </label>
            <label class="legacy-field">
              <span class="sr-only">추가결제 금액</span>
              <input type="number" name="extraPaymentAmount" min="0" placeholder="금액">
            </label>
            <label class="legacy-field">
              <span>납부금액</span>
              <input type="number" name="paymentDue" min="0" placeholder="납부금액">
            </label>
          </div>

          <div class="legacy-col">
            <label class="legacy-field">
              <span>신고담당자</span>
              <select name="manager">
                <option value="">신고담당자명</option>
                <option>신현찬</option>
                <option>노채운</option>
                <option>담당자 배정 대기</option>
              </select>
            </label>
            <label class="legacy-field">
              <span class="sr-only">추가결제 상태</span>
              <select name="businessExtraType">
                <option value="">추가결제선택</option>
                <option>미등록카드추가</option>
                <option>온라인매출</option>
                <option>기타</option>
              </select>
            </label>
            <label class="legacy-field">
              <span class="sr-only">추가결제 금액</span>
              <input type="number" name="businessExtraAmount" min="0" placeholder="금액">
            </label>
            <label class="legacy-check-field">
              <span>납부서전달</span>
              <input type="checkbox" name="beforeDeadline">
            </label>
          </div>

          <div class="legacy-col">
            <label class="legacy-field">
              <span>처리상태</span>
              <select name="processStatus">
                <option>신고접수 및 유형수수료 결제완료</option>
                <option>자료검토 및 신고서작성</option>
                <option>추가옵션결제</option>
                <option>신고접수완료</option>
              </select>
            </label>
            <label class="legacy-field">
              <span class="sr-only">추가결제 항목</span>
              <select name="etcExtraType">
                <option value="">추가결제선택</option>
                <option>미등록카드추가</option>
                <option>온라인매출</option>
                <option>기타</option>
              </select>
            </label>
            <label class="legacy-field">
              <span class="sr-only">추가결제 금액</span>
              <input type="number" name="etcExtraAmount" min="0" placeholder="금액">
            </label>
          </div>

          <div class="legacy-memo-grid">
            <label class="legacy-field memo-field">
              <span>고객 안내 메모</span>
              <textarea name="customerMemo" placeholder="고객 My 택스쿡에 표시됩니다."></textarea>
            </label>
            <label class="legacy-field memo-field">
              <span>관리자 내부 메모</span>
              <textarea name="adminMemo" placeholder="관리자만 확인하는 메모입니다."></textarea>
            </label>
          </div>
        </div>
      </form>

      <section class="legacy-section">
        <div class="legacy-section-title action-title">
          <span>선결제 정보</span>
          <button class="legacy-button danger" type="button" data-cancel-payment>결제취소</button>
        </div>
        <div class="legacy-prepay-strip">
          <div class="legacy-info-cell"><strong>은행</strong><span data-detail-text="bankName">-</span></div>
          <div class="legacy-info-cell"><strong>결제금액</strong><span data-detail-money="paidAmount">-</span></div>
          <div class="legacy-info-cell receipt-cell"><strong>매출전표</strong><button class="legacy-button" type="button" data-receipt-open>보기</button></div>
          <div class="legacy-info-cell"><strong>결제상태</strong><span class="legacy-status-pill" data-detail-text="paymentStatus">-</span></div>
          <div class="legacy-info-cell wide"><strong>주문상품</strong><span data-detail-text="orderName">-</span></div>
        </div>
      </section>
    </main>
  </body>
</html>
