<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>신청 상세 | 택스쿡</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="styles-renewal-20260501-payment-info.css">
    <link rel="stylesheet" href="styles-renewal-20260501-admin-detail-legacy-v7.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="site-renewal-20260501-supabase-config.js"></script>
    <script defer src="site-renewal-20260501-supabase-core-v7.js"></script>
    <script defer src="site-renewal-20260501-admin-detail-v6.js"></script>
  </head>
  <body class="ops-admin-page legacy-detail-page">
    <main class="ops-main legacy-detail-main">
      <section class="legacy-section">
        <div class="legacy-section-title">
          <span>신청자 정보</span>
          <a class="legacy-button subtle" data-list-link href="admin.html">목록</a>
        </div>
        <div class="legacy-applicant-strip vatax-applicant">
          <div class="legacy-info-cell"><strong>신청일자</strong><span data-detail-text="appliedAt">-</span></div>
          <div class="legacy-info-cell"><strong>상호</strong><span data-detail-text="company">-</span></div>
          <div class="legacy-info-cell"><strong>사업자번호</strong><span data-detail-text="businessNumber">-</span></div>
          <div class="legacy-info-cell"><strong>휴대폰번호</strong><span data-detail-text="phone">-</span></div>
        </div>
        <div class="legacy-applicant-strip gitax-applicant">
          <div class="legacy-info-cell"><strong>신청일자</strong><span data-detail-text="appliedAt">-</span></div>
          <div class="legacy-info-cell"><strong>신청자명</strong><span data-detail-text="customerName">-</span></div>
          <div class="legacy-info-cell"><strong>휴대폰번호</strong><span data-detail-text="phone">-</span></div>
          <div class="legacy-info-cell"><strong>생년월일</strong><span data-detail-text="birth">-</span></div>
        </div>
      </section>

      <form class="legacy-section service-detail-form vatax-detail-form" data-application-detail data-service-form="vatax">
        <input type="hidden" name="id">
        <div class="legacy-section-title action-title">
          <span>신고처리 정보</span>
          <button class="legacy-button" type="button" data-edit-application>수정</button>
          <button class="legacy-button" type="submit">저장</button>
          <button class="legacy-button danger" type="button" data-delete-application>삭제</button>
          <span class="legacy-save-message" data-save-message hidden></span>
        </div>
        <div class="legacy-process-panel">
          <div class="legacy-col readonly-col">
            <div class="legacy-read-item"><strong>귀속</strong><span data-detail-text="period">-</span></div>
            <div class="legacy-read-item"><strong>기본수수료</strong><span data-detail-money="baseFee">-</span></div>
            <div class="legacy-read-item"><strong>최종수수료</strong><span data-detail-money="finalPaymentAmount">-</span></div>
          </div>
          <div class="legacy-col readonly-col">
            <div class="legacy-read-item"><strong>유형</strong><span data-detail-text="type">-</span></div>
            <div class="legacy-read-item"><strong>할인금액</strong><span data-detail-money="discountAmount">-</span></div>
            <div class="legacy-read-item"><strong>결제상태</strong><span class="legacy-status-pill" data-detail-text="paymentStatus">-</span></div>
          </div>
          <div class="legacy-col">
            <div class="legacy-read-item"><strong>할인코드</strong><span data-detail-text="couponCode">-</span></div>
            <div class="legacy-read-item"><strong>합계금액 (공급대가)</strong><span data-detail-money="supplyAmount">-</span></div>
            <label class="legacy-field"><span>신고일자</span><input type="date" name="reportDate"></label>
          </div>
          <div class="legacy-col">
            <label class="legacy-field"><span>발행세액공제</span><input type="number" name="creditDeduction" min="0" placeholder="금액"></label>
            <label class="legacy-field"><span class="sr-only">추가결제 항목</span><select name="extraPaymentType" data-fixed-options><option value="">추가결제선택</option><option>미등록카드추가</option><option>온라인매출</option><option>기타</option></select></label>
            <label class="legacy-field"><span class="sr-only">추가결제 금액</span><input type="number" name="extraPaymentAmount" min="0" placeholder="금액"></label>
            <label class="legacy-field"><span>납부금액</span><input type="number" name="paymentDue" min="0" placeholder="납부금액"></label>
          </div>
          <div class="legacy-col">
            <label class="legacy-field"><span>신고담당자</span><select name="manager" data-manager-select><option value="">신고담당자명</option></select></label>
            <label class="legacy-field"><span class="sr-only">추가결제 항목</span><select name="businessExtraType" data-fixed-options><option value="">추가결제선택</option><option>미등록카드추가</option><option>온라인매출</option><option>기타</option></select></label>
            <label class="legacy-field"><span class="sr-only">추가결제 금액</span><input type="number" name="businessExtraAmount" min="0" placeholder="금액"></label>
            <label class="legacy-check-field"><span>납부서전달</span><input type="checkbox" name="beforeDeadline"></label>
          </div>
          <div class="legacy-col">
            <label class="legacy-field"><span>처리상태</span><select name="processStatus" data-fixed-options data-default-option="신고접수 및 유형수수료 결제완료"><option>신고접수 및 유형수수료 결제완료</option><option>자료검토 및 신고서작성</option><option>추가옵션결제</option><option>신고접수완료</option></select></label>
            <label class="legacy-field"><span class="sr-only">추가결제 항목</span><select name="etcExtraType" data-fixed-options><option value="">추가결제선택</option><option>미등록카드추가</option><option>온라인매출</option><option>기타</option></select></label>
            <label class="legacy-field"><span class="sr-only">추가결제 금액</span><input type="number" name="etcExtraAmount" min="0" placeholder="금액"></label>
          </div>
          <div class="legacy-memo-grid">
            <label class="legacy-field memo-field"><span>고객 안내 메모</span><textarea name="customerMemo" placeholder="고객 My 택스쿡에 표시됩니다."></textarea></label>
            <label class="legacy-field memo-field"><span>관리자 내부 메모</span><textarea name="adminMemo" placeholder="관리자만 확인하는 메모입니다."></textarea></label>
          </div>
        </div>
      </form>

      <form class="legacy-section service-detail-form gitax-detail-form" data-application-detail data-service-form="gitax">
        <input type="hidden" name="id">
        <div class="legacy-section-title action-title">
          <span>신고처리 정보</span>
          <button class="legacy-button" type="button" data-mark-undelivered>미전송</button>
          <button class="legacy-button" type="submit">전송</button>
          <button class="legacy-button danger" type="button" data-delete-application>삭제</button>
          <span class="legacy-save-message" data-save-message hidden></span>
        </div>
        <div class="gitax-process-panel">
          <div class="gitax-col">
            <div class="legacy-read-item"><strong>사업자구분</strong><span data-detail-text="businessType">-</span></div>
            <label class="legacy-field"><span>신고유형</span><select name="reportType" data-fixed-options><option>복식부기</option><option>간편장부A</option><option>간편장부B</option><option>단순경비율</option><option>기준경비율</option></select></label>
            <div class="legacy-read-item"><strong>계약금</strong><span class="emphasis-red" data-detail-money="depositFee">-</span></div>
            <div class="legacy-read-item"><strong>결제상태</strong><span class="legacy-status-pill" data-detail-text="paymentStatus">-</span></div>
          </div>
          <div class="gitax-col">
            <div class="legacy-read-item"><strong>귀속년도</strong><span data-detail-text="gitaxYear">-</span></div>
            <label class="legacy-field"><span>기본수수료</span><input type="number" name="baseFee" min="0" placeholder="금액"></label>
            <div class="legacy-read-item"><strong>할인코드</strong><span data-detail-text="couponCode">-</span></div>
            <label class="legacy-field"><span>신고일자</span><input type="date" name="reportDate"></label>
          </div>
          <div class="gitax-col">
            <label class="legacy-field"><span>신고담당자</span><select name="manager" data-manager-select><option value="">신고담당자명</option></select></label>
            <label class="legacy-field"><span class="sr-only">추가결제 항목</span><select name="extraPaymentType" data-fixed-options><option value="">추가결제선택</option><option>소득추가</option><option>사업추가</option><option>기타</option><option>기한 후 신고</option></select></label>
            <label class="legacy-field"><span>할인액</span><input type="number" name="discountAmount" min="0" placeholder="금액"></label>
            <label class="legacy-field"><span>산출세액</span><input type="number" name="calculatedTax" min="0" placeholder="금액"></label>
          </div>
          <div class="gitax-col">
            <label class="legacy-field"><span>처리상태</span><select name="processStatus" data-fixed-options data-default-option="신청 접수 및 계약금 결제"><option>신청 접수 및 계약금 결제</option><option>신고유형 검토 및 결제</option><option>신고서 작성</option><option>추가결제 및 최종완료</option><option>신고 접수 완료</option></select></label>
            <label class="legacy-field"><span class="sr-only">추가결제 항목</span><select name="businessExtraType" data-fixed-options><option value="">추가결제선택</option><option>소득추가</option><option>사업추가</option><option>기타</option><option>기한 후 신고</option></select></label>
            <div class="legacy-read-item gitax-fee-row"><strong>최종수수료</strong><span data-detail-money="finalPaymentAmount">-</span></div>
            <label class="legacy-field"><span>기납부세액</span><input type="number" name="prepaidTax" min="0" placeholder="금액"></label>
          </div>
          <div class="gitax-col">
            <label class="legacy-field"><span class="sr-only">추가결제 항목</span><select name="etcExtraType" data-fixed-options><option value="">추가결제선택</option><option>소득추가</option><option>사업추가</option><option>기타</option><option>기한 후 신고</option></select></label>
            <label class="legacy-field"><span class="sr-only">추가결제 금액</span><input type="number" name="etcExtraAmount" min="0" placeholder="금액"></label>
            <div class="legacy-read-item gitax-fee-row"><strong>부가세</strong><span data-detail-money="vatAmount">-</span></div>
            <label class="legacy-field"><span>최종 납부세액</span><input type="number" name="finalTaxDue" min="0" placeholder="금액"></label>
          </div>
          <div class="gitax-col">
            <label class="legacy-field gitax-tax-reduction"><span>세액공제감면</span><input type="number" name="taxReduction" min="0" placeholder="금액"></label>
            <div class="legacy-read-item gitax-fee-row"><strong>합계금액</strong><span data-detail-money="totalAmount">-</span></div>
            <label class="legacy-check-field"><span>납부서 전달</span><input type="checkbox" name="beforeDeadline"></label>
          </div>
          <label class="legacy-field gitax-memo-field"><span>고객 안내 메모</span><textarea name="customerMemo" placeholder="고객 My 택스쿡에 표시됩니다."></textarea></label>
          <label class="legacy-field gitax-memo-field"><span>관리자 내부 메모</span><textarea name="adminMemo" placeholder="관리자만 확인하는 메모입니다."></textarea></label>
        </div>
      </form>

      <section class="legacy-section">
        <div class="legacy-section-title action-title">
          <span>선결제 정보</span>
          <button class="legacy-button danger" type="button" data-cancel-payment>결제취소</button>
        </div>
        <div class="legacy-prepay-strip vatax-prepay">
          <div class="legacy-info-cell"><strong>은행</strong><span data-detail-text="bankName">-</span></div>
          <div class="legacy-info-cell"><strong>결제금액</strong><span data-detail-money="paidAmount">-</span></div>
          <div class="legacy-info-cell receipt-cell"><strong>매출전표</strong><button class="legacy-button" type="button" data-receipt-open>보기</button></div>
          <div class="legacy-info-cell"><strong>결제상태</strong><span class="legacy-status-pill" data-detail-text="paymentStatus">-</span></div>
          <div class="legacy-info-cell wide"><strong>주문상품</strong><span data-detail-text="orderName">-</span></div>
        </div>
        <div class="legacy-prepay-strip gitax-prepay">
          <div class="legacy-info-cell"><strong>카드사</strong><span data-detail-text="cardCompany">-</span></div>
          <div class="legacy-info-cell"><strong>카드번호</strong><span data-detail-text="cardNumber">-</span></div>
          <div class="legacy-info-cell"><strong>주문번호</strong><span data-detail-text="orderId">-</span></div>
          <div class="legacy-info-cell"><strong>승인번호</strong><span data-detail-text="approvalNo">-</span></div>
          <div class="legacy-info-cell"><strong>결제금액</strong><span data-detail-money="paidAmount">-</span></div>
          <div class="legacy-info-cell receipt-cell"><strong>매출전표</strong><button class="legacy-button" type="button" data-receipt-open>보기</button></div>
          <div class="legacy-info-cell"><strong>결제상태</strong><span class="legacy-status-pill" data-detail-text="paymentStatus">-</span></div>
          <div class="legacy-info-cell wide"><strong>주문상품</strong><span data-detail-text="orderName">-</span></div>
        </div>
      </section>
    </main>
  </body>
</html>
