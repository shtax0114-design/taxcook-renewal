<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>통합 관리자 | 택스쿡</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="styles-renewal-20260501-admin-clean.css">
    <link rel="stylesheet" href="styles-renewal-20260501-admin-dashboard-v3.css">
    <link rel="stylesheet" href="styles-renewal-20260502-admin-search-horizontal.css">
    <link rel="stylesheet" href="styles-renewal-20260502-admin-popup-manager.css">
    <link rel="stylesheet" href="styles-renewal-20260502-admin-column-filters-v7.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="site-renewal-20260501-supabase-config.js"></script>
    <script defer src="site-renewal-20260501-supabase-core-v7.js"></script>
    <script defer src="site-renewal-20260502-admin-dashboard-popup-v11.js"></script>
  </head>
  <body class="ops-admin-page">
    <main class="ops-main">
      <div class="ops-title-bar admin-real-title">
        <h1>통합 관리자</h1>
        <button class="admin-refresh-button" type="button" data-admin-refresh>새로고침</button>
        <label class="admin-search"><span>검색</span><input type="search" data-admin-search aria-label="검색"></label>
      </div>

      <nav class="admin-legacy-menu" aria-label="관리자 메뉴">
        <div class="admin-menu-group">
          <button class="admin-menu-button" type="button"><span class="admin-menu-icon">♙</span>기본정보 <i class="admin-menu-caret"></i></button>
          <div class="admin-dropdown">
            <button type="button" data-admin-tab="members" data-member-filter="customer"><span class="admin-menu-icon">▱</span>고객 정보</button>
            <button type="button" data-admin-tab="members" data-member-filter="admin"><span class="admin-menu-icon">▱</span>관리자 정보</button>
          </div>
        </div>
        <div class="admin-menu-group">
          <button class="admin-menu-button" type="button"><span class="admin-menu-icon">□</span>신청/결제 <i class="admin-menu-caret"></i></button>
          <div class="admin-dropdown">
            <button type="button" data-service-shortcut="gitax"><span class="admin-menu-icon">▱</span>종소세신고 신청</button>
            <button type="button" data-service-shortcut="vatax"><span class="admin-menu-icon">▱</span>부가세신고 신청</button>
            <button type="button" data-admin-tab="applications"><span class="admin-menu-icon">▣</span>전체 신청</button>
          </div>
        </div>
        <div class="admin-menu-group">
          <button class="admin-menu-button" type="button"><span class="admin-menu-icon">⚙</span>설정 <i class="admin-menu-caret"></i></button>
          <div class="admin-dropdown">
            <button type="button" data-admin-tab="popups"><span class="admin-menu-icon">▣</span>메인 팝업</button>
            <button type="button" data-admin-tab="discounts"><span class="admin-menu-icon">▣</span>할인코드 관리</button>
            <button type="button" data-admin-tab="members" data-permission-mode="true"><span class="admin-menu-icon">▱</span>권한 관리</button>
          </div>
        </div>
        <button class="admin-menu-link" type="button" data-admin-logout>로그아웃</button>
      </nav>
      <div class="admin-accent-bar" aria-hidden="true"></div>

      <div class="ops-toolbar admin-real-toolbar admin-dashboard-toolbar">
        <button class="ops-button active" type="button" data-admin-tab="applications">전체 신청</button>
        <button class="ops-button" type="button" data-admin-tab="members">회원정보</button>
        <button class="ops-button" type="button" data-admin-tab="popups">메인팝업</button>
        <button class="ops-button" type="button" data-admin-tab="discounts">할인코드</button>
        <a class="ops-button" href="admin-vatax.html">부가세만</a>
        <a class="ops-button" href="admin-gitax.html">종소세만</a>
        <select class="admin-filter" data-service-filter aria-label="서비스 필터">
          <option value="">전체 서비스</option>
          <option value="vatax">부가세</option>
          <option value="gitax">종소세</option>
        </select>
        <select class="admin-filter" data-process-filter aria-label="처리상태 필터">
          <option value="">전체 처리상태</option>
          <option>신청 접수</option>
          <option>신청 접수 및 계약금 결제</option>
          <option>신고유형 검토 및 결제</option>
          <option>신고서 작성</option>
          <option>추가결제 및 최종완료</option>
          <option>신고 접수 완료</option>
        </select>
      </div>

      <section data-admin-panel="applications">
        <div class="ops-table-wrap">
          <table class="ops-table admin-real-table">
            <thead>
              <tr>
                <th>신청내용</th>
                <th>고객/업체 <button class="column-filter-button" type="button" data-column-filter="customer" aria-label="고객/업체 검색"><span class="column-filter-icon"></span></button></th>
                <th>사업자구분 <button class="column-filter-button" type="button" data-column-filter="businessType" aria-label="사업자구분 검색"><span class="column-filter-icon"></span></button></th>
                <th>신고유형</th>
                <th>처리상태 <button class="column-filter-button" type="button" data-column-filter="processStatus" aria-label="처리상태 검색"><span class="column-filter-icon"></span></button></th>
                <th>결제상태</th>
                <th>납부서</th>
                <th>최종결제금액</th>
                <th>담당자 <button class="column-filter-button" type="button" data-column-filter="manager" aria-label="담당자 검색"><span class="column-filter-icon"></span></button></th>
                <th>휴대폰번호 <button class="column-filter-button" type="button" data-column-filter="phone" aria-label="휴대폰번호 검색"><span class="column-filter-icon"></span></button></th>
                <th>최종수정자</th>
                <th>변경일시</th>
              </tr>
            </thead>
            <tbody data-admin-all-list></tbody>
          </table>
        </div>
      </section>

      <div class="column-filter-panel" data-column-filter-panel hidden></div>

      <section data-admin-panel="members" hidden>
        <div class="permission-guard" data-permission-guard hidden>
          <form class="permission-guard-form" data-permission-form>
            <label>
              <span>대표 비밀번호</span>
              <input type="password" name="ownerPasscode" autocomplete="current-password" required>
            </label>
            <button type="submit">확인</button>
            <p data-permission-message hidden></p>
          </form>
          <div class="permission-actions" data-permission-actions hidden>
            <button type="button" data-permission-save disabled>권한 저장</button>
            <span data-permission-dirty hidden></span>
          </div>
        </div>
        <div class="ops-table-wrap">
          <table class="ops-table member-admin-table">
            <thead>
              <tr>
                <th>권한</th>
                <th>이메일</th>
                <th>이름</th>
                <th>휴대폰번호</th>
                <th>사업자구분</th>
                <th>사업자번호</th>
                <th>가입일</th>
                <th>최종수정일</th>
              </tr>
            </thead>
            <tbody data-admin-members-list></tbody>
          </table>
        </div>
      </section>

      <section data-admin-panel="popups" hidden>
        <div class="popup-admin-title">메인팝업</div>
        <div class="popup-admin-toolbar">
          <button class="grid-tool add" type="button" data-popup-add><span>＋</span>추가</button>
          <button class="grid-tool danger" type="button" data-popup-delete-selected><span>×</span>선택삭제</button>
          <span class="popup-admin-message" data-popup-message hidden></span>
        </div>
        <div class="popup-admin-wrap">
          <table class="popup-admin-table">
            <thead>
              <tr>
                <th><input type="checkbox" data-popup-check-all aria-label="전체 선택"></th>
                <th></th>
                <th>이미지</th>
                <th>게시기간</th>
                <th>사용여부</th>
                <th>최종수정자</th>
                <th>최종수정일</th>
              </tr>
            </thead>
            <tbody data-popup-list></tbody>
          </table>
        </div>
      </section>

      <section data-admin-panel="discounts" hidden>
        <div class="popup-admin-title">할인코드 조회</div>
        <div class="popup-admin-toolbar">
          <button class="grid-tool add" type="button" data-discount-add><span>＋</span>추가</button>
          <button class="grid-tool danger" type="button" data-discount-delete-selected><span>×</span>선택삭제</button>
          <span class="popup-admin-message" data-discount-message hidden></span>
        </div>
        <div class="popup-admin-wrap">
          <table class="discount-admin-table">
            <thead>
              <tr>
                <th><input type="checkbox" data-discount-check-all aria-label="전체 선택"></th>
                <th></th>
                <th>할인코드</th>
                <th>할인금액</th>
                <th>사용여부</th>
                <th>최종수정자</th>
                <th>최종수정일</th>
              </tr>
            </thead>
            <tbody data-discount-list></tbody>
          </table>
        </div>
      </section>

      <div class="popup-modal-backdrop" data-popup-modal hidden>
        <form class="popup-modal" data-popup-form>
          <input type="hidden" name="id">
          <input type="hidden" name="imageUrl">
          <input type="hidden" name="imagePath">
          <button class="popup-modal-close" type="button" data-popup-close aria-label="닫기">×</button>
          <h2 data-popup-modal-title>모달팝업 추가</h2>
          <label class="popup-modal-row">
            <span>이미지 선택</span>
            <input class="popup-file-input" type="file" name="imageFile" accept="image/*">
            <button class="popup-file-button" type="button" data-popup-file-button>Choose</button>
          </label>
          <div class="popup-preview" data-popup-preview hidden></div>
          <label class="popup-modal-row popup-date-row">
            <span>게시기간</span>
            <input type="date" name="startDate" required>
            <em>~</em>
            <input type="date" name="endDate" required>
          </label>
          <label class="popup-modal-row">
            <span>사용여부</span>
            <select name="isActive">
              <option value="true">사용</option>
              <option value="false">미사용</option>
            </select>
          </label>
          <div class="popup-modal-actions">
            <button class="legacy-button danger" type="button" data-popup-close>취소</button>
            <button class="legacy-button" type="submit">확인</button>
          </div>
        </form>
      </div>

      <div class="popup-modal-backdrop" data-discount-modal hidden>
        <form class="popup-modal discount-modal" data-discount-form>
          <input type="hidden" name="id">
          <button class="popup-modal-close" type="button" data-discount-close aria-label="닫기">×</button>
          <h2 data-discount-modal-title>할인코드 추가</h2>
          <label class="popup-modal-row">
            <span>할인코드</span>
            <input type="text" name="code" maxlength="40" required>
          </label>
          <label class="popup-modal-row">
            <span>할인금액</span>
            <input type="number" name="amount" min="0" step="1000" required>
          </label>
          <label class="popup-modal-row">
            <span>사용여부</span>
            <select name="isActive">
              <option value="true">사용</option>
              <option value="false">미사용</option>
            </select>
          </label>
          <div class="popup-modal-actions">
            <button class="legacy-button danger" type="button" data-discount-close>취소</button>
            <button class="legacy-button" type="submit">확인</button>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
