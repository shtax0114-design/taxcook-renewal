<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <title>My 택스쿡 | 택스쿡</title>
    <meta name="description" content="택스쿡 신청 내역과 진행 상태를 확인하세요.">
    <meta name="robots" content="noindex, follow">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="styles-renewal-20260501-ops-wrap.css">
    <link rel="stylesheet" href="styles-renewal-20260501-mypage-mobilecards.css">
    <link rel="stylesheet" href="styles-renewal-20260501-auth-reset-v1.css">
    <link rel="stylesheet" href="styles-renewal-20260501-nav-mobile-fix.css">
    <link rel="stylesheet" href="styles-renewal-20260502-mypage-password-button-v1.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="site-renewal-20260501-supabase-config.js"></script>
    <script defer src="site-renewal-20260502-supabase-core-v8.js"></script>
    <script defer src="site-renewal-20260503-nav-auth-state-v2.js"></script>
    <script defer src="site-renewal-20260503-mypage-profile-v4.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="/" aria-label="택스쿡"><img src="image/logo-taxcook-20260430-kong-crop.png" alt="택스쿡"></a>
        <nav class="nav" data-nav data-open="false" aria-label="주요 메뉴">
          <a href="knowhow.html">택스쿡 소개</a>
          <a href="vatax.html">부가가치세 신고</a>
          <a href="gitax.html">종합소득세 신고</a>
        </nav>
        <div class="header-actions">
          <a class="login-link" href="login.html">로그인</a>
          <a class="nav-cta" href="mypage.html">My 택스쿡</a>
          <a class="nav-cta mobile-login-cta" href="login.html">로그인</a>
          <button class="menu-button" type="button" data-menu-button aria-label="메뉴 열기" aria-expanded="false">☰</button>
        </div>
      </div>
    </header>
    <main class="mypage-main">
      <section class="mypage-shell">
        <div class="mypage-topbar">
          <div class="mypage-title">
            <h1><span data-my-name>택스쿡 고객</span>님의 신청 내역</h1>
          </div>
        </div>

        <dl class="mypage-profile" aria-label="고객 정보">
          <div><dt>이메일</dt><dd data-profile-email>-</dd></div>
          <div><dt>성명</dt><dd data-profile-name>-</dd></div>
          <div><dt>휴대폰번호</dt><dd data-profile-phone>-</dd></div>
          <div><dt>사업자구분</dt><dd data-profile-business>-</dd></div>
        </dl>

        <section class="profile-panel" aria-labelledby="profile-title">
          <h2 id="profile-title">고객정보 입력</h2>
          <form class="profile-form" data-profile-form>
            <label class="profile-field">
              성명
              <input type="text" name="name" autocomplete="name">
            </label>
            <label class="profile-field">
              휴대폰번호
              <input type="tel" name="phone" maxlength="11" autocomplete="tel">
            </label>
            <label class="profile-field">
              사업자구분
              <select name="businessType">
                <option value="">선택</option>
                <option value="사업자">사업자</option>
                <option value="비사업자">비사업자</option>
              </select>
            </label>
            <label class="profile-field">
              사업자번호
              <input type="text" name="bizNumber" maxlength="10" inputmode="numeric">
            </label>
            <p class="profile-message" data-profile-message hidden></p>
            <div class="profile-actions">
              <button class="profile-save" type="submit">저장</button>
              <a class="profile-password-link" href="password.html">비밀번호 변경</a>
            </div>
          </form>
        </section>

        <div class="mypage-card">
          <table class="ops-table mypage-table">
            <thead>
              <tr>
                <th>귀속</th>
                <th>신청일자</th>
                <th>신고일자</th>
                <th>납부(환급)내역</th>
                <th>고객 안내사항</th>
              </tr>
            </thead>
            <tbody data-my-applications></tbody>
          </table>
        </div>
        <div class="mypage-mobile-list" data-my-mobile-applications aria-label="모바일 신청 내역"></div>
      </section>
    </main>
  </body>
</html>
